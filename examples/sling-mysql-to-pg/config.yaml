# Seatbelt validation config for the MySQL -> Postgres (Sling) example.
# Source = MySQL, Target = Postgres. The "generic" row mapper is an identity mapper suitable for
# integer/string columns copied 1:1 by Sling.

source_connection_string: "mysql://sling:slingpw@localhost:55820/shop"
target_connection_string: "postgres://postgres:postgres@localhost:55821/shop"

row_mapper_name: "generic"

# Source table (MySQL database is taken from the connection string).
table_name: "products"
# Sling writes to public.products on the Postgres side.
target_table_name: "public.products"
primary_key_name: "id"

columns:
  - name: "sku"
    source_type: "varchar"
    target_type: "text"
  - name: "name"
    source_type: "varchar"
    target_type: "text"
  - name: "category"
    source_type: "varchar"
    target_type: "text"
  - name: "quantity"
    source_type: "int"
    target_type: "integer"

seatbelt_data_path: "tmp/shadow.db"
environment:
  SEATBELT_TEMP_DIR: "tmp/"
