# Corrupt Target Test
# Tests that Seatbelt correctly detects corruption in the target database

name: Corrupt Target Test
random_seed: 51
description: >
  This test verifies that corruption in the target database is correctly
  detected by Seatbelt. It creates data, loads it to target, then corrupts
  the target and checks that validation errors are detected.

# Expected result metrics at the end
expect:
  - name: Validation errors detected
    type: validation_error
    expected: true

  - name: Error count is correct
    type: metric
    metric: error_count
    comparison: greater_than
    value: 0

plan:
  # Insert rows
  - operation: insert
  - operation: insert
  - operation: insert

  # Extract and load
  - operation: extract
  - operation: load

  # Validate to establish baseline
  - operation: seatbelt_check

  # 2nd Extract and load cycle required to see the discrepancy at the target
  - operation: extract
  - operation: load

  # Validate to establish baseline
  - operation: seatbelt_check

  # Expectations after load
  - operation: expect
    name: No errors after initial load
    type: metric
    metric: discrepant_count
    comparison: equal
    value: 0

  # Corrupt the target
  - operation: corrupt_target

  # Run seatbelt check to detect corruption
  - operation: seatbelt_check

  # Verify corruption is detected
  - operation: expect
    name: Corruption detected
    type: metric
    metric: error_count
    comparison: greater_than
    value: 0 
