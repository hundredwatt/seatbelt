name: Float Downcast Test (Float64 to Float32)
random_seed: 42

schema:
  columns:
    - name: measurement
      type: float
      nullable: true
      target_type: float32

initial_data:
  row_count: 4
  rows:
    - measurement: 0.3730283610466326
    - measurement: -0.3730283610466326
    - measurement: 0.3730283610466326
    - measurement: -0.3730283610466326

plan:
  - operation: initialize
  - operation: expect
    name: 4 valid rows after initialization
    type: metric
    metric: valid_count
    comparison: equal
    value: 4


  - operation: corrupt_target
    row:
      id: 3
      measurement: 0.3730283
  - operation: corrupt_target
    row:
      id: 4
      measurement: -0.3730283

  - operation: extract
  - operation: load
  - operation: seatbelt_check

  # Expect no validation errors
  - operation: expect
    name: Validation errors
    type: validation_error
    expected: true
  # Expect 1 discrepant row
  - operation: expect
    name: 2 discrepant rows
    type: metric
    metric: error_count
    comparison: equal
    value: 2

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 4
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 4 