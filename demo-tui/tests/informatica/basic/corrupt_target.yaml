# Basic Validation Test
# Tests that Seatbelt validation detects target database corruption

name: Corrupt Target Test
random_seed: 42

initial_data:
  row_count: 2

plan:
  - operation: initialize

  # Corrupt the target database
  - operation: corrupt_target

  # Perform a noop sync 
  - operation: extract
  - operation: load

  # Run seatbelt validation check to detect the corruption
  - operation: seatbelt_check
  # Expect validation errors
  - operation: expect
    name: No validation errors
    type: validation_error
    expected: true
  # Expect no rows in-flight
  - operation: expect
    name: No rows in-flight
    type: metric
    metric: pending_count
    comparison: equal
    value: 0

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 2
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 2 
