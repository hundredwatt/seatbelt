ame: DateTime Format Discrepancy Test
random_seed: 42

schema:
  columns:
    - name: timestamp
      type: datetime
      nullable: true

initial_data:
  row_count: 6
  rows:
    - timestamp: null
    - timestamp: "Sun, 12 Mar 2023 01:30:00 -0600"  # DST transition time (MDT)
    - timestamp: "Thu, 29 Feb 2024 16:59:59 -0700"  # Leap day (MST)
    - timestamp: "Mon, 18 Jan 2038 20:14:07 -0700"  # Unix 32-bit integer overflow (MST)
    - timestamp: "Fri, 31 Dec 9999 16:59:59 -0700"  # Far future date (MST)
    - timestamp: "Wed, 31 Dec 1969 17:00:00 -0700"  # Unix epoch start (MST)

plan:
  - operation: initialize

  # Corrupt updates
  - operation: corrupt_by_update
    row:
      id: 1
      timestamp: "Sun, 12 Mar 2023 01:30:00 -0600"
  - operation: corrupt_by_update
    row:
      id: 2
      timestamp: "Thu, 29 Feb 2024 16:59:59 -0700"
  - operation: corrupt_target
    row:
      id: 3
      timestamp: "2038-01-19T03:14:07Z"  # Wrong format in target
  - operation: corrupt_target
    row:
      id: 4
      timestamp: "9999-12-31T23:59:58Z"  # Correct ISO format but wrong time (off by 1 second)
  - operation: corrupt_target
    row:
      id: 5
      timestamp: "1970-01-01T00:01:00Z"  # Minute off by 1
  - operation: corrupt_target
    row:
      id: 6
      timestamp: "2022-06-15T18:42:15Z"  # Random timestamp instead of null

  # Run seatbelt validation check
  - operation: seatbelt_check
  - operation: expect
    name: 2 in-flight rows
    type: metric
    metric: pending_count
    comparison: equal
    value: 2

  # Sync the data to the target database
  - operation: extract
  - operation: load

  # Run seatbelt validation check again
  - operation: seatbelt_check
  # Expect validation errors
  - operation: expect
    name: Validation errors
    type: validation_error
    expected: true
  # Expect errors at all 6 rows
  - operation: expect
    name: Error count
    type: metric
    metric: error_count
    comparison: equal
    value: 6
  # Expect no rows in-flight
  - operation: expect
    name: No rows in-flight
    type: metric
    metric: pending_count
    comparison: equal
    value: 0

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 6
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 6