name: String Data Type Discrepancy Test
random_seed: 42

schema:
  columns:
    - name: text
      type: string
      nullable: true

initial_data:
  row_count: 5
  rows:
    - text: null
    - text: ""
    - text: "a"
    - text: "abcdefghijklmnopqrstuvwxyz"
    - text: "😀"

plan:
  - operation: initialize

  # Update rows in source
  - operation: corrupt_by_update
    row:
      id: 2
      text: "😀"
  - operation: corrupt_by_update
    row:
      id: 4
      text: ""

  # Extract and load the changes
  - operation: extract
  - operation: load

  # Validate data sync is good before introducing discrepancies
  - operation: seatbelt_check
  - operation: expect
    name: Initial validation passes
    type: validation_error
    expected: false

  # Corrupt the target directly to create discrepancies
  - operation: corrupt_target
    row:
      id: 1
      text: "CORRUPTED_TEXT"  # Change long string to something different
  - operation: corrupt_target
    row:
      id: 3
      text: "Not NULL anymore"  # Change NULL to a string
  - operation: corrupt_target
    row:
      id: 5
      text: null  # Change string to NULL

  # Run seatbelt check to detect discrepancies
  - operation: seatbelt_check
  
  # Expect validation errors
  - operation: expect
    name: Validation errors detected
    type: validation_error
    expected: true
    
  # Expect exactly 3 discrepant rows
  - operation: expect
    name: 5 discrepant rows
    type: metric
    metric: error_count
    comparison: equal
    value: 5

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 5
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 5 
