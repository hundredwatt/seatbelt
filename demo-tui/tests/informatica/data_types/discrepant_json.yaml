name: JSON Data Type Discrepancy Test
random_seed: 42

schema:
  columns:
    - name: data
      type: json
      nullable: true

initial_data:
  row_count: 6
  rows:
    - data: null
    - data: []
    - data: {}
    - data: {"a": 1, "b": 2, "c": 3}
    - data: ["a", 1, "b", 2, "c", 3]
    - data: {"nested": {"x": 1, "y": 2}, "list": [1, 2, 3]}

plan:
  - operation: initialize

  # Update rows in source
  - operation: corrupt_by_update
    row:
      id: 2
      data: {"nested": {"x": 1, "y": 2}, "list": [1, 2, 3]}
  - operation: corrupt_by_update
    row:
      id: 3
      data: []
  - operation: corrupt_target
    row:
      id: 4
      data: {"c": 3, "b": 2, "a": 1} # scrambled keys (not a corruption)

  # Extract and load the changes
  - operation: extract
  - operation: load

  # Validate data sync is good before introducing discrepancies
  - operation: seatbelt_check
  - operation: expect
    name: Initial validation passes
    type: validation_error
    expected: false
  - operation: expect
    name: 2 in-flight rows (scrambled keys not an error)
    type: metric
    metric: pending_count
    comparison: equal
    value: 2

  # Corrupt the target directly to create discrepancies
  - operation: corrupt_target
    row:
      id: 1
      data: {"x": 100, "y": 200}  # Change null to an object
  
  # Scrambled key order
  - operation: corrupt_target
    row:
      id: 3
      data: {"c": 3, "a": 1, "b": 2}  # Same data but keys in different order
  
  # Change to different but similar data
  - operation: corrupt_target
    row:
      id: 5
      data: ["c", 3, "b", 2, "a", 1]  # Different order of array elements
  
  # Change nested structure
  - operation: corrupt_target
    row:
      id: 6
      data: {"list": [1, 2, 3], "nested": {"y": 2, "x": 1}}  # Keys scrambled at both levels

  # Run seatbelt check to detect discrepancies
  - operation: seatbelt_check
  
  # Expect validation errors
  - operation: expect
    name: Validation errors detected
    type: validation_error
    expected: true
    
  # Expect exactly 4 discrepant rows
  - operation: expect
    name: 4 discrepant rows
    type: metric
    metric: error_count
    comparison: equal
    value: 4

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 6
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 6 