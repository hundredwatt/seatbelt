name: Integer Downcast Test (Integer64 to Integer32)
random_seed: 42
description: |
  This test checks the behavior of downcasting integer64 values to integer32. 
  Out of bounds integer64 values are converted to NULL in the target.

schema:
  columns:
    - name: measurement
      type: integer
      nullable: true
      target_type: decimal

initial_data:
  row_count: 5
  rows:
    - measurement: null
    - measurement: 0
    - measurement: 1
    - measurement: -1
    - measurement: 42

plan:
  - operation: initialize
  - operation: expect
    name: 5 valid rows after initialization
    type: metric
    metric: valid_count
    comparison: equal
    value: 5

  - operation: corrupt_target
    row:
      id: 3
      measurement: 1.01
  - operation: corrupt_target
    row:
      id: 4
      measurement: -0.99

  - operation: seatbelt_check

  # Expect validation errors after corruption
  - operation: expect
    name: Validation errors
    type: validation_error
    expected: true
  # Expect 2 discrepant rows
  - operation: expect
    name: 2 discrepant rows
    type: metric
    metric: error_count
    comparison: equal
    value: 2

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 5
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 5 