# Basic Validation Test
# Tests that Seatbelt validation works correctly with expected data flow

name: Valid Delete Test
random_seed: 42

initial_data:
  row_count: 2

plan:
  - operation: initialize

  # Delete a row
  - operation: delete

  # Run seatbelt validation check to detect the in-flight row
  - operation: seatbelt_check
  - operation: expect
    name: 1 in-flight row
    type: metric
    metric: pending_count
    comparison: equal
    value: 1

  # Sync the data to the target database
  - operation: extract
  - operation: load

  # Run seatbelt validation check again to see all rows valid
  - operation: seatbelt_check
  # Expect no validation errors
  - operation: expect
    name: No validation errors
    type: validation_error
    expected: false
  # Expect no rows in-flight
  - operation: expect
    name: No rows in-flight
    type: metric
    metric: pending_count
    comparison: equal
    value: 0

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 1
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 1 
