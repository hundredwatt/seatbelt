name: Decimal Boundary Test
random_seed: 42

schema:
  columns:
    - name: price
      type: decimal
      nullable: true

initial_data:
  row_count: 9
  rows:
    - price: null
    - price: 0.00
    - price: -0.00
    - price: 1.00
    - price: -1.00
    - price: 9999999.99  # Max for DECIMAL(10,2)
    - price: -9999999.99  # Min for DECIMAL(10,2)
    - price: 0.01  # Smallest positive
    - price: -0.01  # Smallest negative


plan:
  - operation: initialize

  # Corrupt updates
  - operation: corrupt_by_update
    row:
      id: 1
      price: 9999999.99
  - operation: corrupt_by_update
    row:
      id: 2
      price: -9999999.99
  - operation: corrupt_by_update
    row:
      id: 3
      price: 0.01
  - operation: corrupt_by_update
    row:
      id: 4
      price: -0.01
  - operation: corrupt_target
    row:
      id: 5
      price: 0.00
  - operation: corrupt_target
    row:
      id: 6
      price: -0.00
  - operation: corrupt_target
    row:
      id: 7
      price: 1.00
  - operation: corrupt_target
    row:
      id: 8
      price: -1.00
  - operation: corrupt_target
    row:
      id: 9
      price: null

  # Run seatbelt validation check to detect the in-flight rows
  - operation: seatbelt_check
  - operation: expect
    name: 4 in-flight rows
    type: metric
    metric: pending_count
    comparison: equal
    value: 4

  # Sync the data to the target database
  - operation: extract
  - operation: load

  # Run seatbelt validation check again
  - operation: seatbelt_check
  # Expect validation errors
  - operation: expect
    name: Validation errors
    type: validation_error
    expected: true
  # Expect errors at all rows
  - operation: expect
    name: Error count
    type: metric
    metric: error_count
    comparison: equal
    value: 9
  # Expect no rows in-flight
  - operation: expect
    name: No rows in-flight
    type: metric
    metric: pending_count
    comparison: equal
    value: 0

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 9
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 9 