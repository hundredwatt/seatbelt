name: DateTime Format Conversion Test
random_seed: 42

schema:
  columns:
    - name: timestamp
      type: datetime
      nullable: true

initial_data:
  row_count: 6
  rows:
    - timestamp: null
    - timestamp: "Wed, 31 Dec 1969 17:00:00 -0700"  # Unix epoch start (MST)
    - timestamp: "Fri, 31 Dec 9999 16:59:59 -0700"  # Far future date (MST)
    - timestamp: "Mon, 18 Jan 2038 20:14:07 -0700"  # Unix 32-bit integer overflow (MST)
    - timestamp: "Thu, 29 Feb 2024 16:59:59 -0700"  # Leap day (MST)
    - timestamp: "Sun, 12 Mar 2023 01:30:00 -0600"  # DST transition time (MDT)

plan:
  - operation: initialize

  # Valid updates
  - operation: update
    row:
      id: 1
      timestamp: "Sun, 12 Mar 2023 01:30:00 -0600"
  - operation: update
    row:
      id: 2
      timestamp: "Thu, 29 Feb 2024 16:59:59 -0700"
  - operation: update
    row:
      id: 3
      timestamp: "Mon, 18 Jan 2038 20:14:07 -0700"
  - operation: update
    row:
      id: 4
      timestamp: "Fri, 31 Dec 9999 16:59:59 -0700"
  - operation: update
    row:
      id: 5
      timestamp: "Wed, 31 Dec 1969 17:00:00 -0700"
  - operation: update
    row:
      id: 6
      timestamp: null

  # Run seatbelt validation check to detect the in-flight rows
  - operation: seatbelt_check
  - operation: expect
    name: 6 in-flight rows
    type: metric
    metric: pending_count
    comparison: equal
    value: 6

  # Sync the data to the target database
  - operation: extract
  - operation: load

  # Run seatbelt validation check again
  - operation: seatbelt_check
  # Expect no validation errors
  - operation: expect
    name: Validation errors
    type: validation_error
    expected: false
  # Expect no rows in-flight
  - operation: expect
    name: No rows in-flight
    type: metric
    metric: pending_count
    comparison: equal
    value: 0

expect:
  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 6
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 6