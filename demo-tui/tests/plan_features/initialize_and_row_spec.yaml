name: Plan Features Test
random_seed: 42
description: >
  This test demonstrates the new plan features: initialize operation and row specification.

schema:
  columns:
    - name: temperature
      type: integer
      nullable: true
    - name: humidity
      type: float
      nullable: true

initial_data:
  row_count: 2
  rows:
    - temperature: 20
      humidity: 45.5
    - temperature: 25
      humidity: 60.0

# Expected result metrics
expect:
  - name: No validation errors
    type: validation_error
    expected: false

  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 3
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 3

  - name: No rows in-flight
    type: metric
    metric: pending_count
    comparison: equal
    value: 0

plan:
  # Initialize the system - this performs seatbelt_check, extract, load, seatbelt_check
  - operation: initialize

  # Insert a row with specific values
  - operation: insert
    row:
      temperature: 30
      humidity: 75.5

  # Update a row with specific values 
  - operation: update
    id: 3  # Update the row we just inserted
    row:
      temperature: 35
      humidity: 80.0

  # Extract and load to sync all changes
  - operation: extract
  - operation: load

  # Verify with seatbelt
  - operation: seatbelt_check 