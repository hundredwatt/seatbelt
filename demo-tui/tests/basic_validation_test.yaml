# Basic Validation Test
# Tests that Seatbelt validation works correctly with expected data flow

name: Basic Validation Test
random_seed: 42
description: >
  This test verifies that the basic validation scenario works correctly.
  It inserts data in the source, extracts it, loads it to the target,
  and verifies that no validation errors are detected.

# Expected result metrics
expect:
  - name: No validation errors
    type: validation_error
    expected: false

  - name: Source row count 
    type: metric
    metric: source_db_size
    comparison: equal
    value: 5
  
  - name: Target row count matches
    type: metric
    metric: target_db_size
    comparison: equal
    value: 5 

  - name: No rows in-flight
    type: metric
    metric: pending_count
    comparison: equal
    value: 0

plan:
  # Insert 5 rows
  - operation: insert
  - operation: insert
  - operation: insert
  - operation: insert
  - operation: insert

  # Extract and load
  - operation: extract
  - operation: load

  # Run seatbelt validation check
  - operation: seatbelt_check