# Example configuration for a customer data schema
# This demonstrates how to configure a custom schema with different column types

random_seed: 42
seatbelt_interval: 25

schema:
  columns:
    # id column is automatically added by the system
    - name: first_name
      type: string
      nullable: false
    
    - name: last_name
      type: string
      nullable: false
    
    - name: email
      type: string
      nullable: false
    
    - name: age
      type: integer
      nullable: true
      # Example of type conversion from int in source to float in target
      target_type: float
    
    - name: customer_since
      type: date
      nullable: false
    
    - name: is_active
      type: boolean
      nullable: false
    
    - name: last_login
      type: datetime
      nullable: true

initial_data:
  row_count: 5  # Generate 5 random rows
  rows:
    # Optional: Define specific initial rows
    - first_name: John
      last_name: Doe
      email: john.doe@example.com
      age: 35
      is_active: true
    
    - first_name: Jane
      last_name: Smith
      email: jane.smith@example.com
      age: null  # Example of NULL value
      is_active: false

# Example plan that demonstrates various operations
plan:
  - operation: trace
    after:
      operation: insert
  
  - operation: insert_with_null
    column: age
  
  - operation: extract
  
  - operation: load
  
  - operation: update
    id: 1
    values:
      first_name: Johnny
      is_active: false
  
  - operation: set_null_corruption
    column: age
    enabled: true
  
  - operation: extract
  
  - operation: load
  
  - operation: corrupt_target
  
  - operation: seatbelt_check 