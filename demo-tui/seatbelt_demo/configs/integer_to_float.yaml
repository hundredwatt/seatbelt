# Example configuration for a customer data schema
# This demonstrates how to configure a custom schema with different column types

random_seed: 42

schema:
  columns:
    # id column is automatically added by the system
    - name: quantity
      type: integer
      nullable: true
      target_type: float

initial_data:
  row_count: 3  # Generate 5 random rows
  rows:
    # Optional: Define specific initial rows
    - quantity: 1
    - quantity: 2
    - quantity: NULL


# Example plan that demonstrates various operations
plan:
  - operation: trace
    after:
      operation: insert
  
  - operation: insert_with_null
    column: age
  
  - operation: extract
  
  - operation: load
  
  - operation: update
    id: 1
    values:
      first_name: Johnny
      is_active: false
  
  - operation: set_null_corruption
    column: age
    enabled: true
  
  - operation: extract
  
  - operation: load
  
  - operation: corrupt_target
  
  - operation: seatbelt_check 
