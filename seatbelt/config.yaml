# Database connection details
database:
  std_conn_string: "postgres://postgres:postgres@localhost:55810/seatbelt"
  repl_conn_string: "postgres://postgres:postgres@localhost:55810/seatbelt?replication=database"

# Replication settings
replication:
  slot_name: "seatbelt_test_slot"
  publication_name: "seatbelt_test_pub"
  idle_timeout: "10s" # How long to wait for new messages before stopping replication processing

# Table and hashing configuration
table:
  name: "public.data_proof_test" # Schema-qualified table name
  id_column: "id"
  hash_columns: # Columns to concatenate and hash (in order)
    - "smallint_col"
    - "bigint_col"
    - "float_col"
    - "double_col"

# Hashing seed
hash_seed: 42

# Output files
output:
  select_csv_path: "select_output.csv"
  replication_csv_path: "replication_output.csv"

# Debug flag
debug: true
