database_name: postgres
types:
  - name: smallint
    family: integer
    aliases: [int2]
    documentation: "Signed two-byte integer"
  - name: integer
    family: integer
    aliases: [int, int4]
    documentation: "Signed four-byte integer"
  - name: bigint
    family: integer
    aliases: [int8]
    documentation: "Signed eight-byte integer"
  - name: decimal
    family: decimal
    aliases: [numeric]
    attributes:
      - name: precision
        description: "Total number of digits"
      - name: scale
        description: "Number of digits in the fractional part"
    documentation: "Exact numeric of selectable precision"
  - name: real
    family: float
    aliases: [float4]
    documentation: "Single precision floating-point number (4 bytes)"
  - name: double precision
    family: float
    aliases: [float8]
    documentation: "Double precision floating-point number (8 bytes)"
  - name: character varying
    family: string
    aliases: [varchar]
    attributes:
      - name: n
        description: "Maximum length"
    documentation: "Variable-length character string"
  - name: character
    family: string
    aliases: [char]
    attributes:
      - name: n
        description: "Fixed length"
    documentation: "Fixed-length character string"
  - name: text
    family: string
    aliases: []
    documentation: "Variable-length character string (unlimited)"
  - name: bytea
    family: binary
    aliases: []
    documentation: "Binary data ('byte array')"
  - name: date
    family: date
    aliases: []
    documentation: "Calendar date (year, month, day)"
  - name: timestamp without time zone
    family: datetime
    aliases: [timestamp]
    attributes:
      - name: p
        description: "Fractional seconds precision"
    documentation: "Date and time (no time zone)"
  - name: timestamp with time zone
    family: datetime
    aliases: [timestamptz]
    attributes:
      - name: p
        description: "Fractional seconds precision"
    documentation: "Date and time, including time zone"
  - name: boolean
    family: boolean
    aliases: [bool]
    documentation: "Logical Boolean (true/false)"
  - name: uuid
    family: uuid
    aliases: []
    documentation: "Universally unique identifier"
  - name: json
    family: json
    aliases: []
    documentation: "Textual JSON data"
  - name: jsonb
    family: json
    aliases: []
    documentation: "Binary JSON data, decomposed"
  # Add more types based on https://www.postgresql.org/docs/current/datatype.html
  # e.g., time, interval, network types, geometric, arrays, etc. 
